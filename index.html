<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자율신경 밸런스 체크 🌿</title>
<meta name="description" content="자율신경실조증 자가설문 - 익명으로 빠르게 체크해보는 재미있는 셀프 테스트">
<style>
  :root{
    color-scheme: light;
    --page:      #f9f9f7;
    --surface:   #fcfcfb;
    --surface-2: #ffffff;
    --ink:       #0b0b0b;
    --ink-2:     #52514e;
    --muted:     #898781;
    --hairline:  #e1e0d9;
    --border:    rgba(11,11,11,0.10);
    --accent:    #1baf7a;
    --accent-ink:#0b6b47;
    --track:     #ece9e2;

    --good:      #0ca30c;
    --warning:   #fab219;
    --serious:   #ec835a;
    --critical:  #d03b3b;
  }
  @media (prefers-color-scheme: dark){
    :root{
      color-scheme: dark;
      --page:      #0d0d0d;
      --surface:   #1a1a19;
      --surface-2: #201f1e;
      --ink:       #ffffff;
      --ink-2:     #c3c2b7;
      --muted:     #898781;
      --hairline:  #2c2c2a;
      --border:    rgba(255,255,255,0.10);
      --accent:    #199e70;
      --accent-ink:#7fe0c0;
      --track:     #2c2c2a;
    }
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--page);
    color:var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    line-height:1.5;
    padding: 24px 14px 60px;
  }
  .wrap{ max-width: 640px; margin: 0 auto; }

  .hero{
    text-align:center;
    padding: 20px 16px 8px;
  }
  .hero .badge{
    display:inline-block;
    font-size: 13px;
    color:var(--accent-ink);
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    border-radius: 999px;
    padding: 4px 12px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .hero h1{
    font-size: 26px;
    margin: 4px 0 6px;
  }
  .hero p{
    color:var(--ink-2);
    font-size: 14.5px;
    margin: 0 auto;
    max-width: 480px;
  }
  .mascot{
    font-size: 56px;
    margin: 10px 0 2px;
    animation: bob 2.6s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-6px) rotate(-3deg); }
  }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius: 18px;
    padding: 18px 18px 16px;
    margin: 14px 0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  .privacy-note{
    display:flex;
    gap:10px;
    align-items:flex-start;
    font-size: 13.5px;
    color:var(--ink-2);
    background: var(--surface-2);
    border:1px dashed var(--hairline);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .privacy-note .ico{ font-size:18px; flex:0 0 auto; }

  #startBtn, .primary-btn{
    width:100%;
    border:none;
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 700;
    color:#fff;
    background: linear-gradient(135deg, var(--accent), #0d8a5e);
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease;
    box-shadow: 0 6px 16px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  #startBtn:active, .primary-btn:active{ transform: scale(0.98); }

  /* progress bar */
  .progress-shell{
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--page);
    padding: 10px 0 6px;
  }
  .progress-track{
    height: 10px;
    background: var(--track);
    border-radius: 999px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--accent), #0d8a5e);
    border-radius: 999px;
    transition: width .25s ease;
  }
  .progress-label{
    display:flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 6px;
  }

  .category{
    display:none;
  }
  .category.active{ display:block; }
  .category-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom: 12px;
  }
  .category-head .emoji{
    font-size: 26px;
  }
  .category-head h2{
    font-size: 17px;
    margin:0;
  }
  .category-head .count{
    margin-left:auto;
    font-size: 12.5px;
    color: var(--muted);
  }

  .item{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 12px 12px;
    border-radius: 12px;
    border:1px solid var(--hairline);
    margin-bottom: 8px;
    cursor:pointer;
    background: var(--surface-2);
    transition: border-color .15s ease, background .15s ease;
    user-select:none;
  }
  .item:hover{ border-color: var(--accent); }
  .item.checked{
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, var(--surface-2));
  }
  .item input{
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
    flex: 0 0 auto;
  }
  .item label{
    font-size: 14.5px;
    cursor:pointer;
    flex:1;
  }

  .nav-row{
    display:flex;
    gap:10px;
    margin-top: 6px;
  }
  .nav-row button{
    flex:1;
    border-radius: 12px;
    border:1px solid var(--hairline);
    background: var(--surface-2);
    color:var(--ink);
    padding: 12px;
    font-size: 14.5px;
    font-weight:600;
    cursor:pointer;
  }
  .nav-row button.next{
    background: linear-gradient(135deg, var(--accent), #0d8a5e);
    color:#fff;
    border:none;
  }
  .nav-row button:disabled{
    opacity: 0.4;
    cursor:not-allowed;
  }

  #testSection{ display:none; }
  #resultSection{ display:none; }

  /* result */
  .result-face{
    text-align:center;
    font-size: 64px;
    margin-bottom: 4px;
  }
  .result-tier{
    text-align:center;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .result-desc{
    text-align:center;
    color:var(--ink-2);
    font-size: 14.5px;
    margin: 0 auto 12px;
    max-width: 460px;
  }
  .result-score{
    text-align:center;
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .result-score b{
    color:var(--ink);
    font-size: 15px;
  }

  .tier-good     .result-tier{ color: var(--good); }
  .tier-warning  .result-tier{ color: #b98000; }
  .tier-serious  .result-tier{ color: var(--serious); }
  .tier-critical .result-tier{ color: var(--critical); }

  /* breakdown chart */
  .breakdown-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .breakdown-row .b-label{
    flex: 0 0 108px;
    color: var(--ink-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .breakdown-row .b-track{
    flex:1;
    height: 10px;
    background: var(--track);
    border-radius: 999px;
    overflow:hidden;
  }
  .breakdown-row .b-fill{
    height:100%;
    background: var(--accent);
    border-radius: 999px;
    width:0%;
    transition: width .5s ease;
  }
  .breakdown-row .b-val{
    flex: 0 0 34px;
    text-align:right;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .divider{
    border:none;
    border-top:1px solid var(--hairline);
    margin: 16px 0;
  }

  .consent-row{
    display:flex;
    gap:10px;
    align-items:flex-start;
    font-size: 13.5px;
    color: var(--ink-2);
    margin-bottom: 12px;
  }
  .consent-row input{
    width:20px; height:20px; flex:0 0 auto; margin-top:2px;
    accent-color: var(--accent);
  }

  .action-row{
    display:flex;
    gap:10px;
  }
  .action-row button{
    flex:1;
    border-radius: 12px;
    padding: 12px;
    font-size: 14.5px;
    font-weight:700;
    cursor:pointer;
  }
  #sendBtn{
    border:none;
    color:#fff;
    background: linear-gradient(135deg, var(--accent), #0d8a5e);
  }
  #sendBtn:disabled{ opacity:.4; cursor:not-allowed; }
  #copyBtn{
    border:1px solid var(--hairline);
    background: var(--surface-2);
    color: var(--ink);
  }

  #restartBtn{
    display:block;
    width:100%;
    margin-top: 10px;
    background:none;
    border:none;
    color: var(--muted);
    font-size: 13.5px;
    text-decoration: underline;
    cursor:pointer;
  }

  .toast{
    position: fixed;
    left:50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--page);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13.5px;
    opacity:0;
    pointer-events:none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 50;
  }
  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  .confetti-piece{
    position: fixed;
    top: -10px;
    z-index: 40;
    border-radius: 2px;
    pointer-events:none;
    animation: fall linear forwards;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(540deg); opacity: 0.2; }
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
  }
  footer a{ color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="badge">HAPPY H Hospital</div>
    <div class="mascot" id="mascot">🌿</div>
    <h1>자율신경 밸런스 체크</h1>
    <p>몸이 요즘 유난히 예민하고 힘들다면? 40개 문항으로 내 자율신경이 얼마나 지쳐있는지 1분 만에 확인해보세요.</p>
  </div>

  <div id="introSection">
    <div class="card privacy-note">
      <span class="ico">🔒</span>
      <span>이름, 나이, 연락처 등 <b>개인정보는 전혀 입력하지 않아요</b>. 오직 체크한 증상 개수만으로 결과를 계산하며, 이 브라우저 안에서만 처리돼요.</span>
    </div>
    <div class="card">
      <button id="startBtn" onclick="startTest()">테스트 시작하기 ✨</button>
    </div>
  </div>

  <div id="testSection">
    <div class="progress-shell">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label">
        <span id="progressStep">1 / 8</span>
        <span id="progressChecked">체크한 증상: 0개</span>
      </div>
    </div>

    <div class="card" id="categoryCard">
      <!-- categories injected here -->
    </div>

    <div class="nav-row">
      <button id="prevBtn" onclick="goStep(-1)">이전</button>
      <button id="nextBtn" class="next" onclick="goStep(1)">다음</button>
    </div>
  </div>

  <div id="resultSection" class="card">
    <div class="result-face" id="resultFace">🙂</div>
    <div class="result-tier" id="resultTier">결과를 계산 중...</div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-score">체크한 증상 <b id="resultCount">0</b>개 / 40개</div>

    <div id="breakdown"></div>

    <hr class="divider">

    <div class="consent-row">
      <input type="checkbox" id="consentCheck" onchange="toggleSend()">
      <label for="consentCheck">이 결과(체크 항목 수와 등급)를 병원으로 전달하는 데 동의합니다. 이름 등 개인정보는 포함되지 않아요.</label>
    </div>
    <div class="action-row">
      <button id="sendBtn" disabled onclick="sendResult()">결과 보내기 💌</button>
      <button id="copyBtn" onclick="copyResult()">결과 복사 📋</button>
    </div>

    <button id="restartBtn" onclick="restartTest()">처음부터 다시하기 ↺</button>
  </div>

  <footer>
    HAPPY H Hospital · 이 테스트는 참고용 자가설문이며 의학적 진단을 대신하지 않습니다.<br>
    문의 1551-7582
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
  const CATEGORIES = [
    { id:'general', name:'전신 증상', emoji:'🌡️', items:[
      '미열이 있는 것처럼 몸이 으슬으슬하다',
      '최근 3개월 사이 3kg 이상 체중이 변했다',
      '땀을 지나치게 많이 흘리거나 반대로 잘 나지 않는다',
      '이유 없이 몸이 나른하고 쉽게 피곤하다',
      '추위나 더위를 유난히 많이 탄다',
      '열이 올랐다 내렸다 하며 식은땀과 오한이 있다',
    ]},
    { id:'brain', name:'뇌 / 신경', emoji:'🧠', items:[
      '잠이 잘 오지 않는다',
      '자다가 자주 깬다',
      '두통이 잦다',
      '어지럼증이 있다',
      '귀울림(이명)이 있다',
      '편두통이 있다',
      '눈이 쉽게 피로하고 눈꺼풀이 떨린다',
    ]},
    { id:'scalp', name:'두피 / 피부', emoji:'💇', items:[
      '스트레스성 탈모가 있다',
      '지루성 두피염이 있다',
      '피부가 거칠어지고 예민해졌다',
    ]},
    { id:'chest', name:'가슴', emoji:'❤️', items:[
      '가슴이 두근거린다',
      '가슴 통증이나 답답함이 있다',
      '숨쉬기 힘들 때가 있다',
      '가슴이 조이듯 압박감이 든다',
      '불안감을 자주 느낀다',
      '우울한 기분이 자주 든다',
    ]},
    { id:'arm', name:'팔', emoji:'💪', items:[
      '팔에 힘이 빠진다',
      '목과 어깨가 자주 뭉친다',
      '맥박이 불규칙하게 느껴진다(부정맥)',
      '손발이 차고 저리다(수족냉증)',
      '손이 떨리거나 조절이 잘 안 된다',
      '팔이나 목 디스크 증상이 있다',
    ]},
    { id:'urinary', name:'비뇨기', emoji:'🚻', items:[
      '소변을 자주 본다(빈뇨)',
      '밤에 소변 때문에 자주 깬다(야뇨)',
      '배뇨 기능이 예전 같지 않다',
    ]},
    { id:'digestive', name:'소화기', emoji:'🍽️', items:[
      '복통이 잦다',
      '명치 끝이 답답하다',
      '과민성 장증후군처럼 잦은 설사가 있다',
      '소화가 잘 안 되고 속이 더부룩하다',
    ]},
    { id:'legs', name:'다리', emoji:'🦵', items:[
      '하체에 힘이 없다',
      '다리에 쥐가 자주 난다',
      '잠들기 전 다리가 불편해 뒤척인다',
      '다리가 화끈거리거나 자주 붓는다',
      '다리가 쉽게 저리다',
    ]},
  ];

  const TOTAL_ITEMS = CATEGORIES.reduce((n,c)=>n+c.items.length,0);

  // Where anonymous results are sent when a user opts in. Change to your own address.
  const HOSPITAL_EMAIL = 'nothing4ukim@gmail.com';

  let currentStep = 0;
  const checkedState = {}; // "catId-itemIdx" -> true

  function startTest(){
    document.getElementById('introSection').style.display = 'none';
    document.getElementById('testSection').style.display = 'block';
    renderCategory();
  }

  function renderCategory(){
    const cat = CATEGORIES[currentStep];
    const card = document.getElementById('categoryCard');
    const checkedInCat = cat.items.filter((_,i)=>checkedState[cat.id+'-'+i]).length;

    let html = `<div class="category active">
      <div class="category-head">
        <span class="emoji">${cat.emoji}</span>
        <h2>${cat.name}</h2>
        <span class="count">${checkedInCat}/${cat.items.length}</span>
      </div>`;

    cat.items.forEach((text, i)=>{
      const key = cat.id+'-'+i;
      const isChecked = !!checkedState[key];
      html += `<div class="item ${isChecked?'checked':''}" onclick="toggleItem('${key}')">
        <input type="checkbox" id="chk-${key}" ${isChecked?'checked':''} onclick="event.stopPropagation(); toggleItem('${key}')">
        <label for="chk-${key}">${text}</label>
      </div>`;
    });

    html += `</div>`;
    card.innerHTML = html;

    document.getElementById('progressStep').textContent = `${currentStep+1} / ${CATEGORIES.length}`;
    updateProgress();

    document.getElementById('prevBtn').disabled = currentStep === 0;
    document.getElementById('nextBtn').textContent = currentStep === CATEGORIES.length-1 ? '결과 보기 🎉' : '다음';
  }

  function toggleItem(key){
    checkedState[key] = !checkedState[key];
    renderCategory();
  }

  function updateProgress(){
    const total = Object.values(checkedState).filter(Boolean).length;
    const pct = Math.min(100, (currentStep+1) / CATEGORIES.length * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressChecked').textContent = `체크한 증상: ${total}개`;
  }

  function goStep(dir){
    if(dir === 1 && currentStep === CATEGORIES.length-1){
      showResult();
      return;
    }
    currentStep = Math.max(0, Math.min(CATEGORIES.length-1, currentStep+dir));
    renderCategory();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function getBreakdown(){
    return CATEGORIES.map(cat=>{
      const count = cat.items.filter((_,i)=>checkedState[cat.id+'-'+i]).length;
      return { ...cat, count };
    });
  }

  function getTier(total){
    if(total < 3) return {
      key:'good', face:'😊', label:'가능성 낮음 · 안심하세요',
      desc:'지금은 자율신경실조증 가능성이 낮아요. 지금처럼 컨디션 관리를 잘 유지해보세요!'
    };
    if(total <= 5) return {
      key:'warning', face:'🙂', label:'가능성 있음',
      desc:'약간의 자율신경 불균형 신호가 보여요. 수면, 스트레스 관리에 조금 더 신경 써주세요.'
    };
    if(total <= 10) return {
      key:'serious', face:'😟', label:'자율신경실조증 의심',
      desc:'증상이 여러 개 겹쳐 있어요. 전문의와 상담해보시는 걸 권해드려요.'
    };
    return {
      key:'critical', face:'😣', label:'가능성 큼 · 검사 권장',
      desc:'자율신경실조증 가능성이 커요. 가까운 시일 내 전문 클리닉에서 검사와 치료를 시작해보세요.'
    };
  }

  function showResult(){
    document.getElementById('testSection').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});

    const breakdown = getBreakdown();
    const total = breakdown.reduce((n,c)=>n+c.count,0);
    const tier = getTier(total);

    const resultSection = document.getElementById('resultSection');
    resultSection.className = 'card tier-' + tier.key;

    document.getElementById('mascot').textContent = tier.face;
    document.getElementById('resultFace').textContent = tier.face;
    document.getElementById('resultTier').textContent = tier.label;
    document.getElementById('resultDesc').textContent = tier.desc;
    document.getElementById('resultCount').textContent = total;

    const bd = document.getElementById('breakdown');
    bd.innerHTML = breakdown.map(c=>{
      const pct = Math.round((c.count / c.items.length) * 100);
      return `<div class="breakdown-row">
        <span class="b-label">${c.emoji} ${c.name}</span>
        <span class="b-track"><span class="b-fill" style="width:${pct}%"></span></span>
        <span class="b-val">${c.count}/${c.items.length}</span>
      </div>`;
    }).join('');

    if(tier.key === 'good'){
      launchConfetti();
    }
  }

  function toggleSend(){
    document.getElementById('sendBtn').disabled = !document.getElementById('consentCheck').checked;
  }

  function buildResultText(){
    const breakdown = getBreakdown();
    const total = breakdown.reduce((n,c)=>n+c.count,0);
    const tier = getTier(total);
    const lines = [
      '[자율신경 밸런스 체크 결과 - 익명]',
      `총 체크: ${total} / ${TOTAL_ITEMS}`,
      `결과: ${tier.label}`,
      '',
      '카테고리별 체크 수:',
      ...breakdown.map(c=>`- ${c.name}: ${c.count}/${c.items.length}`),
    ];
    return lines.join('\n');
  }

  function sendResult(){
    if(!document.getElementById('consentCheck').checked) return;
    const body = buildResultText();
    const subject = '자율신경 밸런스 체크 결과 (익명)';
    const url = `mailto:${HOSPITAL_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = url;
  }

  function copyResult(){
    const text = buildResultText();
    navigator.clipboard.writeText(text).then(()=>{
      showToast('결과가 복사됐어요 📋');
    }).catch(()=>{
      showToast('복사에 실패했어요');
    });
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }

  function restartTest(){
    Object.keys(checkedState).forEach(k=>delete checkedState[k]);
    currentStep = 0;
    document.getElementById('consentCheck').checked = false;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('mascot').textContent = '🌿';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('introSection').style.display = 'block';
    document.getElementById('testSection').style.display = 'none';
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function launchConfetti(){
    const colors = ['#1baf7a', '#eda100', '#2a78d6', '#e87ba4', '#eb6834'];
    for(let i=0;i<36;i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = 6 + (i % 4) * 2;
      piece.style.width = size + 'px';
      piece.style.height = (size*0.4) + 'px';
      piece.style.left = (Math.random()*100) + 'vw';
      piece.style.background = colors[i % colors.length];
      const duration = 2.2 + Math.random()*1.4;
      piece.style.animationDuration = duration + 's';
      piece.style.animationDelay = (Math.random()*0.4) + 's';
      document.body.appendChild(piece);
      setTimeout(()=>piece.remove(), (duration+0.6)*1000);
    }
  }
</script>
</body>
</html>
